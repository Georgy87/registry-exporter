databaseChangeLog:
  - changeSet:
      id: drop-transfer-flow
      author: georgy
      changes:
        - dropTable:
            tableName: t_transfer_flow
            cascadeConstraints: true

  - changeSet:
      id: create-transfer-flow
      author: georgy
      changes:
        - createTable:
            tableName: t_transfer_flow
            columns:
              - column:
                  name: id
                  type: BIGINT
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: originator_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: receiver_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: settlement_participant_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: payment_flow_type
                  type: VARCHAR(50)

        - createSequence:
            sequenceName: seq_contract_flow_id
            startValue: 1
            incrementBy: 1

        - addForeignKeyConstraint:
            baseTableName: t_transfer_flow
            baseColumnNames: originator_id
            referencedTableName: bank
            referencedColumnNames: id
            constraintName: fk_tf_originator

        - addForeignKeyConstraint:
            baseTableName: t_transfer_flow
            baseColumnNames: receiver_id
            referencedTableName: bank
            referencedColumnNames: id
            constraintName: fk_tf_receiver

        - addForeignKeyConstraint:
            baseTableName: t_transfer_flow
            baseColumnNames: settlement_participant_id
            referencedTableName: bank
            referencedColumnNames: id
            constraintName: fk_tf_settlement_participant

        - createIndex:
            tableName: t_transfer_flow
            indexName: idx_tf_originator_id
            columns:
              - column:
                  name: originator_id

        - createIndex:
            tableName: t_transfer_flow
            indexName: idx_tf_receiver_id
            columns:
              - column:
                  name: receiver_id

        - createIndex:
            tableName: t_transfer_flow
            indexName: idx_tf_settlement_participant_id
            columns:
              - column:
                  name: settlement_participant_id

