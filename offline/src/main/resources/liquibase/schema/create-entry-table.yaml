databaseChangeLog:
  - changeSet:
      id: create-entry-sequence
      author: georgy
      changes:
        - createSequence:
            sequenceName: entry_seq
            startValue: 1
            incrementBy: 1

  - changeSet:
      id: create-entry-table
      author: georgy
      changes:
        - createTable:
            tableName: entry
            columns:
              - column:
                  name: id
                  type: BIGINT
                  defaultValueSequenceNext: entry_seq
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: transfer_id
                  type: BIGINT

              - column:
                  name: business_day
                  type: DATE

              - column:
                  name: state
                  type: VARCHAR(50)

              - column:
                  name: amount
                  type: NUMERIC(19,2)

              - column:
                  name: participant_id
                  type: BIGINT

        - addForeignKeyConstraint:
            baseTableName: entry
            baseColumnNames: transfer_id
            referencedTableName: transfer
            referencedColumnNames: id
            constraintName: fk_entry_transfer

        - addForeignKeyConstraint:
            baseTableName: entry
            baseColumnNames: participant_id
            referencedTableName: bank
            referencedColumnNames: id
            constraintName: fk_entry_participant
