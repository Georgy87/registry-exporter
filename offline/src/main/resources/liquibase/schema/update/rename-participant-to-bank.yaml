databaseChangeLog:
  - changeSet:
      id: rename-participant-to-bank
      author: georgy
      changes:
        - renameColumn:
            tableName: entry
            oldColumnName: participant_id
            newColumnName: bank_id
            columnDataType: BIGINT
  - changeSet:
      id: update-foreign-key-for-bank
      author: georgy
      changes:
        - dropForeignKeyConstraint:
            baseTableName: entry
            constraintName: fk_entry_participant

        - addForeignKeyConstraint:
            baseTableName: entry
            baseColumnNames: bank_id
            referencedTableName: bank
            referencedColumnNames: id
            constraintName: fk_entry_bank