databaseChangeLog:
  - changeSet:
      id: add-transfer-originator-receiver
      author: georgy
      changes:
        - addColumn:
            tableName: transfer
            columns:
              - column:
                  name: originator_id
                  type: BIGINT
              - column:
                  name: receiver_id
                  type: BIGINT

        - addForeignKeyConstraint:
            baseTableName: transfer
            baseColumnNames: originator_id
            referencedTableName: bank
            referencedColumnNames: id
            constraintName: fk_transfer_originator

        - addForeignKeyConstraint:
            baseTableName: transfer
            baseColumnNames: receiver_id
            referencedTableName: bank
            referencedColumnNames: id
            constraintName: fk_transfer_receiver
