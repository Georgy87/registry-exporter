databaseChangeLog:
  - changeSet:
      id: add-inn-to-bank
      author: georgy
      changes:
        - addColumn:
            tableName: bank
            columns:
              - column:
                  name: inn
                  type: VARCHAR(12)

        - update:
            tableName: bank
            columns:
              - column:
                  name: inn
                  value: "7700000000"   # ИНН для BANK_A
            where: "name = 'BANK_A'"

        - update:
            tableName: bank
            columns:
              - column:
                  name: inn
                  value: "7800000000"   # ИНН для BANK_B
            where: "name = 'BANK_B'"

        - addNotNullConstraint:
            tableName: bank
            columnName: inn
            columnDataType: VARCHAR(12)

        - addUniqueConstraint:
            tableName: bank
            columnNames: inn
            constraintName: uq_bank_inn
